# Go — containerd container runtime, ~85 files
# Mixed range: cgroup mount options fix, parallel unpack workaround, resolver fallback hardening,
# streaming EOF fix, vendor bumps (klauspost/compress, otel, grpc, k8s, platforms).
[[repos]]
name = "containerd-recent"
type = "real"
path = "/Users/jamesaphoenix/Desktop/projects/just-understanding-data/flowdiff-eval-corpus/go/containerd"
language = "go"
range = "33db836a8b06000e8afb5bba947c299ae721878a..131286b17755467322f5fcc2bf90842d4c414b79"
notes = "LARGE. ~85 files, heavy vendor churn. Core changes: cgroup mount option preservation for privileged containers, parallel unpack overlay workaround, resolver transient-error fallback fix, streaming EOF data-loss fix, pusher validation, shim pid typo fix."

[repos.thresholds]
max_groups = 30
max_infra_ratio = 0.60
max_singleton_ratio = 0.60

[repos.expectations]
group_count_min = 3
group_count_max = 12

same_group = [
  # Mount parsing: X-containerd option rejection + parseMountOptions error return
  ["core/mount/mount_linux.go", "core/mount/mount_linux_test.go"],
  # Docker resolver: transient error fallback hardening + tests
  ["core/remotes/docker/resolver.go", "core/remotes/docker/resolver_test.go"],
  # Transfer streaming: EOF-with-data fix + test
  ["core/transfer/streaming/stream.go", "core/transfer/streaming/stream_test.go"],
  # Unpacker: parallel unpack overlay workaround + snapshot labels + test
  ["core/unpack/unpacker.go", "core/unpack/unpacker_test.go"],
  # CRI cgroup namespace ordering + cgroup mount option preservation
  ["internal/cri/opts/spec_linux_opts.go", "internal/cri/server/container_create.go"],
  ["internal/cri/opts/spec_linux_opts.go", "internal/cri/opts/spec_linux_test.go"],
  ["internal/cri/server/container_create.go", "internal/cri/server/container_create_linux_test.go"],
]

